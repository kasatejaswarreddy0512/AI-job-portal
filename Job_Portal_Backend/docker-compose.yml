version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_redis_cache
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Teja@123
      MYSQL_DATABASE: job_portal_resume_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: job_redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: